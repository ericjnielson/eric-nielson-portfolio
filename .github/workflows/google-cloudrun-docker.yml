name: 'Deploy to Cloud Run'

# Deploys the app to Cloud Run on every push to main (and on manual dispatch).
# Authenticates to Google Cloud keylessly via Workload Identity Federation.
#
# One-time setup is documented in docs/DEPLOYMENT.md. In short, set these
# GitHub repository *Variables* (Settings -> Secrets and variables -> Actions ->
# Variables):
#   GCP_PROJECT_ID                  e.g. my-portfolio-project
#   CLOUD_RUN_SERVICE               the existing Cloud Run service name
#   GCP_REGION                      optional, defaults to us-east5
#   GCP_WORKLOAD_IDENTITY_PROVIDER  projects/NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
#   GCP_DEPLOY_SERVICE_ACCOUNT      deployer@PROJECT.iam.gserviceaccount.com

on:
  push:
    branches: ['main']
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    # Skip cleanly (rather than fail) until the repo variables are configured.
    if: ${{ vars.GCP_PROJECT_ID != '' && vars.CLOUD_RUN_SERVICE != '' && vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}

    permissions:
      contents: 'read'
      id-token: 'write'   # required for Workload Identity Federation

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      - name: 'Authenticate to Google Cloud'
        id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          project_id: '${{ vars.GCP_PROJECT_ID }}'
          workload_identity_provider: '${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}'

      - name: 'Deploy to Cloud Run (from source)'
        id: 'deploy'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ vars.CLOUD_RUN_SERVICE }}'
          region: '${{ vars.GCP_REGION || ''us-east5'' }}'
          source: '.'
          # Env vars already configured on the service (e.g. OPENAI_API_KEY) are
          # preserved because none are overridden here.

      - name: 'Show deployed URL'
        run: 'echo "Deployed: ${{ steps.deploy.outputs.url }}"'
